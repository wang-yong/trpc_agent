<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Token 消耗统计</title>
  <script>
    (function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();
  </script>
  <style>
    :root {
      /* Dark theme (default) */
      --bg: #0d0f14;
      --panel: #181b22;
      --panel-2: #1e222b;
      --border: #252a35;
      --border-light: #2d3340;
      --text: #d7dbe0;
      --text-dim: #7a8290;
      --text-faint: #565d6b;
      --accent: #5b8def;
      --accent-2: #7ba5f5;
      --accent-bg: rgba(91,141,239,0.12);
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
      /* Aliases for stats.html compatibility */
      --card-bg: var(--panel);
      --text-secondary: var(--text-dim);
      --text-tertiary: var(--text-faint);
      --primary: var(--accent);
      --primary-light: var(--accent-bg);
      --success: var(--green);
      --success-bg: rgba(63,185,80,.08);
      --warning: var(--orange);
      --danger: var(--red);
    }
    [data-theme="light"] {
      --bg: #f5f7fa;
      --panel: #ffffff;
      --panel-2: #f5f7fa;
      --border: #e8ecf1;
      --border-light: #eef1f6;
      --text: #1d2129;
      --text-dim: #4e5969;
      --text-faint: #86909c;
      --accent: #165dff;
      --accent-2: #4080ff;
      --accent-bg: rgba(22,93,255,0.08);
      --green: #00b42a;
      --orange: #ff7d00;
      --red: #f53f3f;
      --success-bg: rgba(0,180,42,.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px; line-height: 1.5;
    }

    /* ===== Header Nav ===== */
    .nav {
      height: 52px;
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      position: sticky; top: 0; z-index: 100;
    }
    .nav .logo { font-size: 16px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .nav .logo-icon {
      width: 28px; height: 28px; border-radius: 8px;
      background: linear-gradient(135deg, #165dff, #8b5cf6);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
    }
    .nav .spacer { flex: 1; }
    .nav a {
      text-decoration: none; color: var(--text-secondary); font-size: 13px;
      padding: 6px 14px; border-radius: 6px; transition: all .15s;
    }
    .nav a:hover { background: var(--panel-2); color: var(--text); }

    /* ===== User Popup (bottom-left) ===== */
    .user-btn-wrap {
      position: fixed;
      bottom: 16px;
      left: 16px;
      z-index: 200;
    }
    .user-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px 8px 8px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 28px;
      cursor: pointer;
      transition: all .15s;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    .user-btn:hover { border-color: var(--primary); }
    .user-btn .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .user-btn .uname { font-size: 13px; font-weight: 500; color: var(--text); }
    .user-btn .chevron { font-size: 11px; color: var(--text-tertiary); transition: transform .2s; }
    .user-btn-wrap.open .chevron { transform: rotate(180deg); }
    .user-popup {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 0;
      min-width: 180px;
      background: var(--panel);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
      display: none;
    }
    .user-btn-wrap.open .user-popup { display: block; }
    .user-popup-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all .12s;
      text-decoration: none;
    }
    .user-popup-item:hover { background: var(--panel-2); color: var(--text); }
    .user-popup-item .icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
    .user-popup-item .label { flex: 1; }
    .user-popup-divider {
      height: 1px;
      background: var(--border);
      margin: 4px 6px;
    }

    /* ===== Container ===== */
    .container { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }

    /* ===== Quota Card (本月费用与额度) ===== */
    .quota-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .quota-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .quota-header .icon-box {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--success-bg); color: var(--success);
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }
    .quota-title { font-size: 15px; font-weight: 600; }
    .quota-row {
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .quota-used {
      font-size: 18px; font-weight: 600; color: var(--success);
    }
    .quota-sep { color: var(--text-tertiary); font-size: 14px; }
    .quota-total {
      font-size: 18px; font-weight: 600; color: var(--text);
    }
    .quota-help { color: var(--text-tertiary); cursor: help; font-size: 14px; }
    .quota-pct-wrap {
      margin-left: auto; display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--text-secondary);
    }
    .quota-pct-val { font-weight: 600; color: var(--primary); }
    .progress-bar {
      width: 100%; height: 8px; background: var(--border); border-radius: 4px;
      overflow: hidden; margin-top: 14px;
    }
    .progress-fill {
      height: 100%; border-radius: 4px; transition: width .6s ease;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    /* ===== Section Card ===== */
    .section-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .section-head {
      display: flex; align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border-light);
      gap: 16px;
    }
    .section-head .title {
      font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px;
      white-space: nowrap;
    }
    .section-head .title::before {
      content: ""; width: 2px; height: 16px; border-radius: 1px; background: var(--primary);
    }
    .section-tabs { display: flex; gap: 4px; }
    .tab-btn {
      padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
      background: transparent; border: none; color: var(--text-secondary); transition: all .15s;
      white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
    .section-head .stats-inline {
      display: flex; gap: 16px; font-size: 12px; color: var(--text-tertiary); margin-left: auto;
    }
    .stat-item b { color: var(--text-secondary); font-weight: 500; }
    .stat-item.success b { color: var(--success); }
    .section-actions { display: flex; gap: 6px; }
    .action-btn {
      padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
      background: var(--panel-2); border: 1px solid var(--border); color: var(--text-secondary); transition: all .15s;
      display: flex; align-items: center; gap: 4px; white-space: nowrap;
    }
    .action-btn:hover { border-color: var(--primary); color: var(--primary); }
    .action-btn.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }

    /* ===== Tables ===== */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 11px 16px; text-align: left; font-size: 13px; white-space: nowrap; border-bottom: 1px solid var(--border-light); }
    th { background: var(--panel-2); color: var(--text-tertiary); font-weight: 500; font-size: 12px; user-select: none; }
    th.sortable { cursor: pointer; transition: color .15s; }
    th.sortable:hover { color: var(--text-secondary); }
    th .sort-arrow { margin-left: 4px; opacity: .4; font-size: 10px; }
    th.sorted-asc .sort-arrow, th.sorted-desc .sort-arrow { opacity: 1; color: var(--primary); }
    td { color: var(--text-secondary); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--panel-2); }
    .num-cell { text-align: right; font-variant-numeric: tabular-nums; }
    .price-cell { color: var(--success) !important; font-weight: 600; }

    .model-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 500;
      background: var(--panel-2); border: 1px solid var(--border);
    }
    .model-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); }

    .no-data-row td { text-align: center; color: var(--text-tertiary); padding: 30px 16px; }

    /* ===== Detail Records Pagination ===== */
    .detail-footer {
      padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid var(--border-light);
      font-size: 12px; color: var(--text-tertiary);
    }
    .detail-info {}
    .pagination { display: flex; align-items: center; gap: 6px; }
    .page-btn {
      min-width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--card-bg); color: var(--text-secondary); font-size: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; padding: 0 8px;
      transition: all .12s;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
    .page-btn:disabled { opacity: .4; cursor: not-allowed; }
    .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .page-size-select {
      border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px;
      font-size: 12px; color: var(--text-secondary); background: var(--card-bg);
      cursor: pointer; outline: none;
    }

    /* ===== Empty State ===== */
    .empty-state {
      text-align: center; padding: 48px 20px; color: var(--text-tertiary);
    }
    .empty-state .icon-big { font-size: 48px; margin-bottom: 12px; opacity: .6; }
    .empty-state p { font-size: 14px; margin-top: 8px; }

    @media (max-width: 768px) {
      .container { padding: 12px 12px; }
      .section-head { flex-wrap: wrap; gap: 8px; }
      .section-head .stats-inline { order: 100%; width: 100%; margin-top: 4px; justify-content: flex-start; }
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <div class="nav">
    <div class="logo">
      <div class="logo-icon">A</div> AI Agent
    </div>
    <div class="spacer"></div>
    <a href="/">💬 聊天</a>
    <a href="/stats.html">📊 统计</a>
  </div>

  <div class="container">

    <!-- 本月费用与额度 -->
    <div class="quota-card">
      <div class="quota-header">
        <div class="icon-box">📊</div>
        <span class="quota-title">Token 用量概览</span>
      </div>
      <div class="quota-row">
        <span class="quota-used" id="usedTokens">¥ 0.00</span>
        <span class="quota-sep">/</span>
        <span class="quota-total" id="totalQuota">¥ 0.00</span>
        <span class="quota-help" title="按硅基流动计费标准换算，仅供参考">ⓘ</span>
        <span class="quota-pct-wrap">
          已用 <span class="quota-pct-val" id="usagePct">0%</span>
        </span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <!-- 使用汇总 -->
    <div class="section-card">
      <div class="section-head">
        <div class="title">使用汇总</div>
        <div class="section-tabs">
          <button class="tab-btn active" data-tab="product" onclick="switchTab('product')">产品使用汇总</button>
          <button class="tab-btn" data-tab="model" onclick="switchTab('model')">模型使用汇总</button>
        </div>
        <div class="stats-inline" id="summaryInline">
          <span class="stat-item">请求数 <b>0</b></span>
          <span class="stat-item">输入 Tokens <b>0</b></span>
          <span class="stat-item">输出 Tokens <b>0</b></span>
          <span class="stat-item success">费用汇总 <b>¥ 0.00</b></span>
        </div>
        <div class="section-actions">
          <button class="action-btn" id="refreshBtn" onclick="loadStats()">🔄 刷新</button>
        </div>
      </div>
      <div class="table-wrap">
        <table id="summaryTable">
          <thead>
            <tr id="summaryHeadRow">
              <!-- dynamic -->
            </tr>
          </thead>
          <tbody id="summaryBody"></tbody>
        </table>
      </div>
    </div>

    <!-- 详细使用记录 -->
    <div class="section-card">
      <div class="section-head">
        <div class="title">详细使用记录</div>
        <div style="margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-tertiary);">
          <span>每页显示:</span>
          <select class="page-size-select" id="pageSizeSelect" onchange="changePageSize()">
            <option value="25">25</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="sortable" onclick="sortDetail('timestamp')">请求时间 <span class="sort-arrow">⇅</span></th>
              <th>模型 ⓘ</th>
              <th>提问 ⓘ</th>
              <th class="sortable num-cell" onclick="sortDetail('prompt_tokens')">输入 TOKENS <span class="sort-arrow">⇅</span></th>
              <th class="sortable num-cell" onclick="sortDetail('completion_tokens')">输出 TOKENS <span class="sort-arrow">⇅</span></th>
              <th class="sortable num-cell" onclick="sortDetail('total_tokens')">总 TOKENS <span class="sort-arrow">⇅</span></th>
              <th class="sortable num-cell" onclick="sortDetail('cost')">费用 ⓘ <span class="sort-arrow">⇅</span></th>
            </tr>
          </thead>
          <tbody id="detailBody">
          </tbody>
        </table>
      </div>
      <div class="detail-footer">
        <span class="detail-info" id="detailInfo">显示第 0-0 条记录，共 0 条</span>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>

  </div>

  <!-- User Popup (bottom-left) -->
  <div class="user-btn-wrap" id="userBtnWrap">
    <div class="user-btn" id="userBtn">
      <div class="avatar">U</div>
      <span class="uname">User</span>
      <span class="chevron">▲</span>
    </div>
    <div class="user-popup">
      <a href="/" class="user-popup-item">
        <span class="icon">💬</span>
        <span class="label">聊天</span>
      </a>
      <a href="/stats.html" class="user-popup-item">
        <span class="icon">📊</span>
        <span class="label">Token 统计</span>
      </a>
      <div class="user-popup-divider"></div>
      <div class="user-popup-item" id="themeToggle">
        <span class="icon" id="themeIcon">☀️</span>
        <span class="label" id="themeLabel">明亮模式</span>
      </div>
    </div>
  </div>

  <script>
    // ========== Theme ==========
    (function() {
      var saved = localStorage.getItem('theme') || 'dark';
      var iconEl = document.getElementById('themeIcon');
      var labelEl = document.getElementById('themeLabel');
      function updateThemeUI(theme) {
        if (iconEl) iconEl.textContent = theme === 'dark' ? '☀️' : '🌙';
        if (labelEl) labelEl.textContent = theme === 'dark' ? '明亮模式' : '暗色模式';
      }
      updateThemeUI(saved);
      var themeToggle = document.getElementById('themeToggle');
      if (themeToggle) {
        themeToggle.addEventListener('click', function(e) {
          e.stopPropagation();
          var current = document.documentElement.getAttribute('data-theme') || 'dark';
          var next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
          updateThemeUI(next);
        });
      }
    })();

    // ========== User Popup ==========
    (function() {
      var wrap = document.getElementById('userBtnWrap');
      var btn = document.getElementById('userBtn');
      if (!wrap || !btn) return;
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        wrap.classList.toggle('open');
      });
      document.addEventListener('click', function(e) {
        if (!e.target.closest('#userBtnWrap')) {
          wrap.classList.remove('open');
        }
      });
    })();

    // ========== State ==========
    const state = {
      data: null,
      currentTab: 'product',
      pageSize: 25,
      currentPage: 1,
      sortField: 'timestamp',
      sortDir: 'desc', // 'asc' | 'desc'
    };

    // ========== Pricing (SiliconFlow reference rates) ==========
    // Prices per million tokens
    const PRICING = {
      default: { input: 0.001, output: 0.002 },
      'deepseek-ai/DeepSeek-V3':       { input: 0.0001, output: 0.0001 },     // ¥0.1/M in, ¥0.1/M out
      'Qwen/Qwen2.5-72B-Instruct':    { input: 0.002, output: 0.01 },        // ¥2/M in, ¥10/M out
      'Qwen/Qwen2.5-Coder-32B-Instruct': { input: 0.002, output: 0.006 },   // ¥2/M in, ¥6/M out
    };

    function calcCost(model, promptTok, completionTok) {
      let p = PRICING[model] || PRICING.default;
      return (promptTok / 1000000 * p.input + completionTok / 1000000 * p.output);
    }

    function fmtCost(v) {
      return '¥' + v.toFixed(4);
    }

    function fmtNum(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(2) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
      return String(n);
    }

    function shortModel(name) {
      const parts = name.split('/');
      return parts[parts.length - 1];
    }

    function esc(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function fmtTime(ts) {
      const d = new Date(ts * 1000);
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    // ========== Load Data ==========
    async function loadStats() {
      try {
        const resp = await fetch('/api/token-stats');
        state.data = await resp.json();
        renderAll();
      } catch (err) {
        console.error(err);
        document.getElementById('summaryBody').innerHTML =
          `<tr class="no-data-row"><td colspan="10"><div class="empty-state"><div class="icon-big">⚠️</div><p>加载失败: ${esc(err.message)}</p></div></td></tr>`;
      }
    }

    // ========== Render All ==========
    function renderAll() {
      renderQuota();
      renderSummary();
      renderDetail();
    }

    // === Quota Bar ===
    function renderQuota() {
      const s = state.data?.summary || {};
      const totalTok = s.total_tokens || 0;
      // 假设配额 100万 tokens ≈ 约定金额
      const QUOTA_TOKENS = 1000000;
      const quotaYuan = totalTok / 1000000 * 0.5; // 粗略估算
      const usedPct = Math.min((totalTok / QUOTA_TOKENS) * 100, 100);

      document.getElementById('usedTokens').textContent = fmtCost(quotaYuan);
      document.getElementById('totalQuota').textContent = '¥ 500.00';
      document.getElementById('usagePct').textContent = usedPct.toFixed(1) + '%';
      document.getElementById('progressFill').style.width = usedPct + '%';

      // Update inline summary
      const inline = document.getElementById('summaryInline');
      inline.innerHTML = `
        <span class="stat-item">请求数 <b>${s.total_requests || 0}</b></span>
        <span class="stat-item">输入 Tokens <b>${fmtNum(s.total_prompt || 0)}</b></span>
        <span class="stat-item">输出 Tokens <b>${fmtNum(s.total_completion || 0)}</b></span>
        <span class="stat-item success">费用汇总 <b>${fmtCost(quotaYuan)}</b></span>
      `;
    }

    // === Summary Table ===
    function switchTab(tab) {
      state.currentTab = tab;
      document.querySelectorAll('.section-tabs .tab-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === tab);
      });
      renderSummary();
    }

    function renderSummary() {
      const headRow = document.getElementById('summaryHeadRow');
      const body = document.getElementById('summaryBody');
      const byModel = state.data?.by_model || [];

      if (state.currentTab === 'model') {
        headRow.innerHTML = `
          <th class="sortable" onclick="sortSummary('display_name')">模型 ⇅</th>
          <th class="sortable num-cell" onclick="sortSummary('request_count')">请求次数 ⇅</th>
          <th class="sortable num-cell" onclick="sortSummary('prompt_tokens')">输入 TOKENS ⇅</th>
          <th class="sortable num-cell" onclick="sortSummary('completion_tokens')">输出 TOKENS ⇅</th>
          <th class="sortable num-cell" onclick="sortSummary('total_tokens')">总 TOKENS ⇅</th>
          <th class="sortable num-cell" onclick="sortSummary('cost')">费用 ⇅</th>`;
        if (byModel.length === 0) {
          body.innerHTML = `<tr class="no-data-row"><td colspan="6"><div style="padding:24px;text-align:center;color:var(--text-tertiary);">● No data</div></td></tr>`;
          return;
        }
        let html = '';
        for (const m of byModel) {
          const cost = calcCost(m.model, m.prompt_tokens, m.completion_tokens);
          html += `<tr>
            <td><span class="model-tag"><span class="model-dot"></span>${esc(m.display_name)}</span></td>
            <td class="num-cell">${m.request_count}</td>
            <td class="num-cell">${fmtNum(m.prompt_tokens)}</td>
            <td class="num-cell">${fmtNum(m.completion_tokens)}</td>
            <td class="num-cell" style="font-weight:600">${fmtNum(m.total_tokens)}</td>
            <td class="num-cell price-cell">${fmtCost(cost)}</td>
          </tr>`;
        }
        body.innerHTML = html;
      } else {
        // product tab - aggregate all as one product
        const s = state.data?.summary || {};
        const totalCost = 0;
        for (const m of byModel) {
          totalCost += calcCost(m.model, m.prompt_tokens, m.completion_tokens);
        }
        headRow.innerHTML = `
          <th>产品 ⇅</th>
          <th class="num-cell">请求次数 ⇅</th>
          <th class="num-cell">输入 TOKENS ⇅</th>
          <th class="num-cell">输出 TOKENS ⇅</th>
          <th class="num-cell">总 TOKENS ⇅</th>
          <th class="num-cell">费用 ⇅</th>`;
        if (!s.total_requests) {
          body.innerHTML = `<tr class="no-data-row"><td colspan="6"><div style="padding:24px;text-align:center;color:var(--text-tertiary);">● No data</div></td></tr>`;
          return;
        }
        body.innerHTML = `<tr>
          <td><span class="model-tag"><span class="model-dot"></span>AI Agent Chat</span></td>
          <td class="num-cell">${s.total_requests}</td>
          <td class="num-cell">${fmtNum(s.total_prompt || 0)}</td>
          <td class="num-cell">${fmtNum(s.total_completion || 0)}</td>
          <td class="num-cell" style="font-weight:600">${fmtNum(s.total_tokens || 0)}</td>
          <td class="num-cell price-cell">${fmtCost(totalCost)}</td>
        </tr>`;
      }
    }

    // === Detail Records (Paginated & Sortable) ===
    function getSortedRecords() {
      let records = state.data?.recent ? [...state.data.recent] : [];
      records.reverse(); // newest first
      records.sort((a, b) => {
        let va = a[state.sortField];
        let vb = b[state.sortField];
        if (state.sortField === 'cost') {
          va = calcCost(a.model, a.prompt_tokens, a.completion_tokens);
          vb = calcCost(b.model, b.prompt_tokens, b.completion_tokens);
        }
        if (typeof va === 'string') va = va.toLowerCase();
        if (typeof vb === 'string') vb = vb.toLowerCase();
        if (state.sortDir === 'asc') return va > vb ? 1 : va < vb ? -1 : 0;
        return va < vb ? 1 : va > vb ? -1 : 0;
      });
      return records;
    }

    function sortDetail(field) {
      if (state.sortField === field) {
        state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        state.sortField = field;
        state.sortDir = field === 'timestamp' ? 'desc' : 'asc';
      }
      state.currentPage = 1;
      renderDetail();
      updateSortIndicators();
    }

    function updateSortIndicators() {
      document.querySelectorAll('#detailTableWrapper th.sortable').forEach(th => {
        th.classList.remove('sorted-asc', 'sorted-desc');
      });
    }

    function changePageSize() {
      state.pageSize = parseInt(document.getElementById('pageSizeSelect').value);
      state.currentPage = 1;
      renderDetail();
    }

    function renderDetail() {
      const body = document.getElementById('detailBody');
      const infoEl = document.getElementById('detailInfo');
      const pagEl = document.getElementById('pagination');

      const records = getSortedRecords();
      const total = records.length;

      if (total === 0) {
        body.innerHTML = `<tr class="no-data-row"><td colspan="7">
          <tr><td>-</td><td>-</td><td>No data</td><td>-</td><td>0</td><td>0</td><td>0</td><td>¥ 0.00</td></tr>
        </td></tr>`;
        infoEl.textContent = `显示第 0-0 条记录，共 0 条`;
        pagEl.innerHTML = '';
        return;
      }

      const totalPages = Math.ceil(total / state.pageSize);
      if (state.currentPage > totalPages) state.currentPage = totalPages;
      if (state.currentPage < 1) state.currentPage = 1;

      const start = (state.currentPage - 1) * state.pageSize;
      const end = Math.min(start + state.pageSize, total);
      const pageRecords = records.slice(start, end);

      let html = '';
      for (const r of pageRecords) {
        const cost = calcCost(r.model, r.prompt_tokens, r.completion_tokens);
        html += `<tr>
          <td style="color:var(--text-tertiary);font-size:12px;">${fmtTime(r.timestamp)}</td>
          <td><span class="model-tag" style="padding:2px 8px;font-size:11px;">${esc(shortModel(r.model))}</span></td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${r.session_id || ''}">-</td>
          <td class="num-cell">${r.prompt_tokens}</td>
          <td class="num-cell">${r.completion_tokens}</td>
          <td class="num-cell" style="font-weight:600">${r.total_tokens}</td>
          <td class="num-cell price-cell">${fmtCost(cost)}</td>
        </tr>`;
      }
      body.innerHTML = html;

      infoEl.textContent = `显示第 ${start+1}-${end} 条记录，共 ${total} 条`;

      // Pagination
      let pagHtml = '';
      pagHtml += `<button class="page-btn" ${state.currentPage<=1?'disabled':''} onclick="goPage(${state.currentPage-1})">&lt; 上一页</button>`;
      // Page numbers
      const maxPages = 7;
      let startPage = Math.max(1, state.currentPage - Math.floor(maxPages/2));
      let endPage = startPage + maxPages - 1;
      if (endPage > totalPages) { endPage = totalPages; startPage = Math.max(1, endPage - maxPages + 1); }
      if (startPage > 1) { pagHtml += `<button class="page-btn" onclick="goPage(1)">1</button>`; if (startPage > 2) pagHtml += '<span style="color:var(--text-tertiary)">…</span>'; }
      for (let i = startPage; i <= endPage; i++) {
        pagHtml += `<button class="page-btn ${i===state.currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
      }
      if (endPage < totalPages) { if (endPage < totalPages-1) pagHtml += '<span style="color:var(--text-tertiary)">…</span>'; pagHtml += `<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`; }
      pagHtml += `<button class="page-btn" ${state.currentPage>=totalPages?'disabled':''} onclick="goPage(${state.currentPage+1})">下一页 &gt;</button>`;
      pagEl.innerHTML = pagHtml;
    }

    function goPage(p) {
      state.currentPage = p;
      renderDetail();
    }

    window.switchTab = switchTab;
    window.loadStats = loadStats;
    window.sortDetail = sortDetail;
    window.changePageSize = changePageSize;
    window.goPage = goPage;

    // Init
    loadStats();
  </script>
</body>
</html>
