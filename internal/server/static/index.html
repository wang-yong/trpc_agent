<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent</title>
  <script>
    (function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();
  </script>
  <style>
    :root {
      --bg: #0d0f14;
      --sidebar: #14171e;
      --sidebar-hover: #1c2029;
      --panel: #181b22;
      --panel-2: #1e222b;
      --border: #252a35;
      --border-light: #2d3340;
      --text: #d7dbe0;
      --text-dim: #7a8290;
      --text-faint: #565d6b;
      --accent: #5b8def;
      --accent-2: #7ba5f5;
      --accent-bg: rgba(91,141,239,0.12);
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
      --user-bubble: #1e2a3a;
      --ai-bubble: #181b22;
      --code-bg: #0a0c10;
      --overlay-bg: rgba(13,15,20,.85);
      --ai-avatar-grad: linear-gradient(135deg, #2a2f3d, #1e222b);
      --radius: 10px;
    }
    [data-theme="light"] {
      --bg: #f5f7fa;
      --sidebar: #ffffff;
      --sidebar-hover: #f0f2f5;
      --panel: #ffffff;
      --panel-2: #f5f7fa;
      --border: #e8ecf1;
      --border-light: #eef1f6;
      --text: #1d2129;
      --text-dim: #4e5969;
      --text-faint: #86909c;
      --accent: #165dff;
      --accent-2: #4080ff;
      --accent-bg: rgba(22,93,255,0.08);
      --green: #00b42a;
      --orange: #ff7d00;
      --red: #f53f3f;
      --user-bubble: #e8f3ff;
      --ai-bubble: #ffffff;
      --code-bg: #f5f7fa;
      --overlay-bg: rgba(255,255,255,.85);
      --ai-avatar-grad: linear-gradient(135deg, #e8ecf1, #f5f7fa);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      display: flex;
    }

    /* ========== Sidebar ========== */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: width .2s, min-width .2s;
    }
    .sidebar.collapsed { width: 0; min-width: 0; overflow: hidden; border: none; }

    .sidebar-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header .logo {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .sidebar-header .name { font-size: 14px; font-weight: 600; }
    .sidebar-header .badge {
      font-size: 10px; padding: 2px 6px; border-radius: 4px;
      background: var(--accent-bg); color: var(--accent-2); font-weight: 600;
    }

    .new-task-btn {
      margin: 12px 12px 4px;
      padding: 9px 12px;
      background: var(--panel-2);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all .15s;
    }
    .new-task-btn:hover { background: var(--sidebar-hover); border-color: var(--accent); }
    .new-task-btn .plus { font-size: 16px; color: var(--accent); }

    .sidebar-section {
      margin-top: 4px;
    }
    .section-header {
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text-faint);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-header:hover { color: var(--text-dim); }
    .section-header .arrow { transition: transform .2s; font-size: 10px; }
    .section-header.collapsed .arrow { transform: rotate(-90deg); }
    .section-header .count {
      margin-left: auto;
      font-size: 11px;
      background: var(--panel-2);
      padding: 1px 6px;
      border-radius: 8px;
      color: var(--text-dim);
    }

    .skill-list {
      padding: 0 8px;
      overflow: hidden;
    }
    .skill-list.collapsed { display: none; }
    .skill-item {
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all .12s;
    }
    .skill-item:hover { background: var(--sidebar-hover); color: var(--text); }
    .skill-item.active { background: var(--accent-bg); color: var(--accent-2); }
    .skill-item .icon { font-size: 15px; width: 18px; text-align: center; }

    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 8px;
    }
    .session-list.collapsed { display: none; }
    .session-list::-webkit-scrollbar { width: 4px; }
    .session-list::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }

    .session-item {
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
      transition: all .12s;
      position: relative;
      overflow: hidden;
    }
    .session-item:hover { background: var(--sidebar-hover); color: var(--text); }
    .session-item.active { background: var(--accent-bg); color: var(--accent-2); }
    .session-item .title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-item .del {
      opacity: 0;
      font-size: 14px;
      color: var(--text-faint);
      transition: opacity .12s;
      flex-shrink: 0;
      padding: 0 2px;
    }
    .session-item:hover .del { opacity: 1; }
    .session-item .del:hover { color: var(--red); }

    .sidebar-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      position: relative;
      transition: background .12s;
    }
    .sidebar-footer:hover { background: var(--sidebar-hover); }
    .sidebar-footer .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .sidebar-footer .info { flex: 1; min-width: 0; }
    .sidebar-footer .info .uname { font-size: 13px; font-weight: 500; }
    .sidebar-footer .info .plan { font-size: 11px; color: var(--text-faint); }
    .sidebar-footer .chevron { font-size: 12px; color: var(--text-faint); transition: transform .2s; }
    .sidebar-footer.open .chevron { transform: rotate(180deg); }

    /* User Popup Menu */
    .user-popup {
      position: absolute;
      bottom: calc(100% + 4px);
      left: 12px;
      right: 12px;
      background: var(--panel);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      display: none;
      z-index: 200;
    }
    .user-popup.open { display: block; }
    .user-popup-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all .12s;
      text-decoration: none;
    }
    .user-popup-item:hover { background: var(--panel-2); color: var(--text); }
    .user-popup-item .icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
    .user-popup-item .label { flex: 1; }
    .user-popup-item .shortcut { font-size: 11px; color: var(--text-faint); }
    .user-popup-divider {
      height: 1px;
      background: var(--border);
      margin: 4px 6px;
    }

    /* ========== Main Area ========== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }

    .main-header {
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      z-index: 10;
    }
    .main-header .toggle-sidebar {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      transition: all .12s;
    }
    .main-header .toggle-sidebar:hover { color: var(--text); border-color: var(--accent); }
    .main-header .title-area {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; font-weight: 600;
    }
    .main-header .title-area .mode-badge {
      font-size: 11px; padding: 2px 8px; border-radius: 4px;
      background: var(--accent-bg); color: var(--accent-2);
    }
    .main-header .header-actions {
      display: flex; gap: 8px;
    }
    .main-header .header-actions button {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
      transition: all .12s;
    }
    .main-header .header-actions button:hover { color: var(--text); border-color: var(--accent); }

    /* ========== Messages ========== */
    .messages-wrap {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .messages-wrap::-webkit-scrollbar { width: 6px; }
    .messages-wrap::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 6px; }

    .messages {
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 24px 12px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .msg { display: flex; gap: 12px; }
    .msg .avatar {
      flex: 0 0 34px; width: 34px; height: 34px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
    }
    .msg.user { flex-direction: row-reverse; }
    .msg.user .avatar { background: var(--accent); color: #fff; }
    .msg.ai .avatar { background: var(--ai-avatar-grad); color: var(--accent-2); border: 1px solid var(--border-light); }
    .msg .body {
      max-width: 78%;
      min-width: 0;
    }
    .msg.user .body { text-align: right; }
    .bubble {
      display: inline-block;
      padding: 11px 15px;
      border-radius: 14px;
      line-height: 1.65;
      word-break: break-word;
      font-size: 14.5px;
      text-align: left;
      max-width: 100%;
    }
    .msg.user .bubble { background: var(--user-bubble); border-top-right-radius: 4px; }
    .msg.ai .bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-top-left-radius: 4px; }
    .bubble.error { color: var(--red); border-color: rgba(248,81,73,.3); }

    .bubble pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      overflow-x: auto;
      margin: 8px 0;
      font-size: 13px;
      line-height: 1.5;
    }
    .bubble pre code { background: none; padding: 0; font-size: 13px; }
    .bubble code {
      background: rgba(110,118,129,.2);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      font-family: "JetBrains Mono", "Fira Code", Consolas, monospace;
    }
    .bubble p { margin: 4px 0; }
    .bubble ul, .bubble ol { margin: 6px 0; padding-left: 20px; }
    .bubble li { margin: 2px 0; }
    .bubble h1, .bubble h2, .bubble h3 { margin: 10px 0 6px; font-weight: 600; }
    .bubble h1 { font-size: 18px; }
    .bubble h2 { font-size: 16px; }
    .bubble h3 { font-size: 15px; }
    .bubble a { color: var(--accent-2); text-decoration: none; }
    .bubble a:hover { text-decoration: underline; }
    .bubble table { border-collapse: collapse; margin: 8px 0; }
    .bubble th, .bubble td { border: 1px solid var(--border); padding: 6px 10px; font-size: 13px; }
    .bubble th { background: var(--panel-2); }

    .typing::after {
      content: "▍";
      animation: blink 1s steps(2, start) infinite;
      color: var(--accent-2);
    }
    @keyframes blink { to { opacity: 0; } }

    /* ========== Welcome ========== */
    .welcome {
      max-width: 640px;
      margin: auto;
      padding: 40px 24px;
      text-align: center;
    }
    .welcome .icon-big {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .welcome h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .welcome p {
      color: var(--text-dim);
      font-size: 15px;
      margin-bottom: 28px;
    }

    /* ========== Input Area ========== */
    .input-area {
      padding: 0 24px 16px;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }
    .input-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 4px;
      transition: border-color .15s;
    }
    .input-box:focus-within { border-color: var(--accent); }
    .input-box textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14.5px;
      line-height: 1.5;
      resize: none;
      max-height: 200px;
      padding: 10px 12px;
      font-family: inherit;
      min-height: 24px;
    }
    .input-box textarea::placeholder { color: var(--text-faint); }

    .input-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px 6px;
    }
    .tool-btn {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: transparent;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      transition: all .12s;
    }
    .tool-btn:hover { background: var(--panel-2); color: var(--text); }

    .model-selector {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all .12s;
      position: relative;
    }
    .model-selector:hover { border-color: var(--accent); color: var(--text); }
    .model-selector .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
    }
    .model-dropdown {
      position: absolute;
      bottom: calc(100% + 4px);
      left: 0;
      background: var(--panel);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 4px;
      min-width: 180px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      display: none;
      z-index: 100;
    }
    .model-selector.open .model-dropdown { display: block; }
    .model-option {
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .model-option:hover { background: var(--panel-2); color: var(--text); }
    .model-option.active { color: var(--accent-2); }
    .model-option .check { margin-left: auto; opacity: 0; }
    .model-option.active .check { opacity: 1; }

    .send-btn {
      margin-left: auto;
      width: 34px; height: 34px;
      border-radius: 10px;
      background: var(--accent);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      transition: all .12s;
    }
    .send-btn:hover { background: var(--accent-2); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ========== Scene Buttons ========== */
    .scene-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
      padding: 0 4px;
    }
    .scene-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      color: var(--text-dim);
      font-size: 12.5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all .12s;
    }
    .scene-btn:hover { border-color: var(--accent); color: var(--text); background: var(--panel-2); }
    .scene-btn.active { border-color: var(--accent); color: var(--accent-2); background: var(--accent-bg); }
    .scene-btn .icon { font-size: 14px; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-faint);
      margin-top: 8px;
    }

    /* ========== Loading ========== */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: var(--overlay-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .loading-overlay .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ========== Responsive ========== */
    @media (max-width: 768px) {
      .sidebar { position: absolute; z-index: 100; height: 100%; }
      .messages, .input-area { padding-left: 12px; padding-right: 12px; }
    }

    /* ========== Token Stats Modal ========== */
    .stats-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      display: none;
      align-items: center; justify-content: center;
      z-index: 2000;
      backdrop-filter: blur(4px);
    }
    .stats-modal-overlay.open { display: flex; }
    .stats-modal {
      background: var(--panel);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      width: 720px; max-width: 92vw; max-height: 86vh;
      overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .stats-modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .stats-modal-header h2 { font-size: 16px; font-weight: 600; }
    .stats-modal-header .close-btn {
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--panel-2); border: 1px solid var(--border);
      color: var(--text-dim); cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all .12s;
    }
    .stats-modal-header .close-btn:hover { color: var(--text); border-color: var(--red); }
    .stats-modal-body {
      padding: 20px; overflow-y: auto;
      flex: 1; min-height: 0;
    }
    .stats-modal-body::-webkit-scrollbar { width: 5px; }
    .stats-modal-body::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 5px; }

    .stats-summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .stats-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }
    .stats-card .label { font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .stats-card .value { font-size: 22px; font-weight: 700; }
    .stats-card .sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .stats-card.accent .value { color: var(--accent-2); }
    .stats-card.green .value { color: var(--green); }
    .stats-card.orange .value { color: var(--orange); }

    .stats-section-title {
      font-size: 13px; font-weight: 600; color: var(--text-dim);
      margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }
    .stats-section-title::before {
      content: ""; width: 3px; height: 14px; border-radius: 2px; background: var(--accent);
    }

    .stats-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
    .stats-table th, .stats-table td {
      padding: 8px 10px; font-size: 13px; text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .stats-table th { color: var(--text-faint); font-weight: 600; font-size: 11px; text-transform: uppercase; }
    .stats-table td { color: var(--text-dim); }
    .stats-table tr:hover td { color: var(--text); }
    .stats-table .num { text-align: right; font-variant-numeric: tabular-nums; }
    .stats-table .model-tag {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      background: var(--accent-bg); color: var(--accent-2); font-size: 12px;
    }

    .bar-chart { margin-bottom: 24px; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .bar-row .bar-label { width: 140px; font-size: 12px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-row .bar-track { flex: 1; height: 22px; background: var(--panel-2); border-radius: 6px; overflow: hidden; position: relative; }
    .bar-row .bar-fill { height: 100%; border-radius: 6px; transition: width .4s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; }
    .bar-row .bar-fill .bar-text { font-size: 11px; font-weight: 600; color: #fff; white-space: nowrap; }
    .bar-fill.prompt { background: var(--accent); }
    .bar-fill.completion { background: var(--green); }

    .stats-empty { text-align: center; padding: 40px 20px; color: var(--text-faint); }
    .stats-refresh { background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 12px; color: var(--text-dim); font-size: 12px; cursor: pointer; transition: all .12s; }
    .stats-refresh:hover { color: var(--text); border-color: var(--accent); }
  </style>
</head>
<body>

  <!-- ========== Sidebar ========== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">A</div>
      <div class="name">AI Agent</div>
      <div class="badge">Beta</div>
    </div>

    <button class="new-task-btn" id="newTaskBtn">
      <span class="plus">+</span>
      <span>新建任务</span>
    </button>

    <div class="sidebar-section">
      <div class="section-header" id="skillHeader">
        <span class="arrow">▼</span>
        <span>技能</span>
      </div>
      <div class="skill-list" id="skillList">
        <!-- skills rendered by JS -->
      </div>
    </div>

    <div class="sidebar-section" style="flex:1; display:flex; flex-direction:column; min-height:0;">
      <div class="section-header" id="sessionHeader">
        <span class="arrow">▼</span>
        <span>任务列表</span>
        <span class="count" id="sessionCount">0</span>
      </div>
      <div class="session-list" id="sessionList">
        <!-- sessions rendered by JS -->
      </div>
    </div>

    <div class="sidebar-footer" id="sidebarFooter">
      <div class="avatar">U</div>
      <div class="info">
        <div class="uname">User</div>
        <div class="plan">免费版</div>
      </div>
      <span class="chevron">▲</span>
      <div class="user-popup" id="userPopup">
        <a href="/stats.html" class="user-popup-item">
          <span class="icon">📊</span>
          <span class="label">Token 统计</span>
        </a>
        <div class="user-popup-divider"></div>
        <div class="user-popup-item" id="themeToggle">
          <span class="icon" id="themeIcon">☀️</span>
          <span class="label" id="themeLabel">明亮模式</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- ========== Main ========== -->
  <main class="main">
    <div class="main-header">
      <div style="display:flex; align-items:center; gap:10px;">
        <button class="toggle-sidebar" id="toggleSidebar" title="切换侧栏">☰</button>
        <div class="title-area">
          <span>Agent</span>
          <span class="mode-badge">Chat</span>
        </div>
      </div>
      <div class="header-actions">
        <button id="clearBtn" title="清空当前对话">清空</button>
      </div>
    </div>

    <div class="messages-wrap" id="messagesWrap">
      <!-- Welcome screen -->
      <div class="welcome" id="welcome">
        <div class="icon-big">🤖</div>
        <h1>AI Agent</h1>
        <p>选择场景，输入问题，开始与 AI 对话</p>
      </div>

      <div class="messages" id="messages" style="display:none;">
        <!-- messages rendered by JS -->
      </div>
    </div>

    <div class="input-area">
      <div class="input-box">
        <textarea id="input" rows="1" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
        <div class="input-toolbar">
          <button class="tool-btn" title="附件（暂未开放）" disabled>📎</button>
          <button class="tool-btn" title="设置（暂未开放）" disabled>⚙️</button>
          <div class="model-selector" id="modelSelector">
            <span class="dot"></span>
            <span id="modelLabel">加载中...</span>
            <span style="font-size:10px;">▼</span>
            <div class="model-dropdown" id="modelDropdown">
              <!-- model options rendered by JS -->
            </div>
          </div>
          <button class="send-btn" id="sendBtn" title="发送">➤</button>
        </div>
      </div>
      <div class="scene-bar" id="sceneBar">
        <!-- scene buttons rendered by JS -->
      </div>
      <div class="input-hint">回复由 AI 生成，内容仅供参考</div>
    </div>
  </main>

  <!-- ========== Token Stats Modal ========== -->
  <div class="stats-modal-overlay" id="statsModalOverlay">
    <div class="stats-modal">
      <div class="stats-modal-header">
        <h2>📊 Token 消耗统计</h2>
        <div style="display:flex; gap:8px;">
          <button class="stats-refresh" id="statsRefreshBtn">刷新</button>
          <button class="close-btn" id="statsCloseBtn">✕</button>
        </div>
      </div>
      <div class="stats-modal-body" id="statsModalBody">
        <div class="stats-empty">加载中...</div>
      </div>
    </div>
  </div>

  <script>
    // ========== State ==========
    const state = {
      sessions: [],
      currentSessionId: null,
      messages: {},      // sessionId → [{role, content}]
      models: [],
      currentModel: null,
      defaultModel: null,
      skills: [],
      currentSkill: null,
      busy: false,
    };

    // ========== DOM ==========
    const $ = id => document.getElementById(id);
    const messagesWrap = $("messagesWrap");
    const messagesEl = $("messages");
    const welcomeEl = $("welcome");
    const inputEl = $("input");
    const sendBtn = $("sendBtn");
    const sessionListEl = $("sessionList");
    const sessionCountEl = $("sessionCount");
    const skillListEl = $("skillList");
    const sceneBarEl = $("sceneBar");
    const modelSelector = $("modelSelector");
    const modelLabel = $("modelLabel");
    const modelDropdown = $("modelDropdown");

    // ========== Theme ==========
    (function() {
      var saved = localStorage.getItem('theme') || 'dark';
      var iconEl = document.getElementById('themeIcon');
      var labelEl = document.getElementById('themeLabel');
      function updateThemeUI(theme) {
        if (iconEl) iconEl.textContent = theme === 'dark' ? '☀️' : '🌙';
        if (labelEl) labelEl.textContent = theme === 'dark' ? '明亮模式' : '暗色模式';
      }
      updateThemeUI(saved);
      var themeToggle = document.getElementById('themeToggle');
      if (themeToggle) {
        themeToggle.addEventListener('click', function(e) {
          e.stopPropagation();
          var current = document.documentElement.getAttribute('data-theme') || 'dark';
          var next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
          updateThemeUI(next);
        });
      }
    })();

    // ========== User Popup ==========
    (function() {
      var footer = document.getElementById('sidebarFooter');
      var popup = document.getElementById('userPopup');
      if (!footer || !popup) return;
      footer.addEventListener('click', function(e) {
        // Only toggle if clicking the footer itself, not items inside popup
        if (e.target.closest('.user-popup-item')) return;
        e.stopPropagation();
        footer.classList.toggle('open');
        popup.classList.toggle('open');
      });
      document.addEventListener('click', function(e) {
        if (!e.target.closest('#sidebarFooter')) {
          footer.classList.remove('open');
          popup.classList.remove('open');
        }
      });
    })();

    // ========== API ==========
    async function api(path, opts = {}) {
      const resp = await fetch(path, {
        headers: { "Content-Type": "application/json" },
        ...opts,
      });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      return resp;
    }

    async function fetchModels() {
      const resp = await api("/api/models");
      const data = await resp.json();
      state.models = data.models || [];
      state.defaultModel = data.default;
      state.currentModel = state.defaultModel;
      renderModels();
    }

    async function fetchSkills() {
      const resp = await api("/api/skills");
      state.skills = await resp.json();
      renderSkills();
      renderScenes();
    }

    async function fetchSessions() {
      const resp = await api("/api/sessions");
      state.sessions = await resp.json();
      renderSessions();
    }

    async function createSession(title, model) {
      const resp = await api("/api/sessions", {
        method: "POST",
        body: JSON.stringify({ title: title || "新对话", model: model || state.currentModel }),
      });
      return await resp.json();
    }

    async function deleteSession(id) {
      await api(`/api/sessions?id=${encodeURIComponent(id)}`, { method: "DELETE" });
    }

    // ========== Render ==========
    function renderModels() {
      modelDropdown.innerHTML = "";
      for (const m of state.models) {
        const opt = document.createElement("div");
        opt.className = "model-option" + (m.name === state.currentModel ? " active" : "");
        opt.innerHTML = `<span class="dot" style="width:6px;height:6px;border-radius:50%;background:var(--green);"></span><span>${esc(m.display_name)}</span><span class="check">✓</span>`;
        opt.onclick = (e) => {
          e.stopPropagation();
          state.currentModel = m.name;
          modelLabel.textContent = m.display_name;
          renderModels();
          modelSelector.classList.remove("open");
        };
        modelDropdown.appendChild(opt);
      }
      const current = state.models.find(m => m.name === state.currentModel);
      modelLabel.textContent = current ? current.display_name : "Unknown";
    }

    function renderSkills() {
      skillListEl.innerHTML = "";
      for (const sk of state.skills) {
        const item = document.createElement("div");
        item.className = "skill-item";
        item.innerHTML = `<span class="icon">${sk.icon}</span><span>${esc(sk.name)}</span>`;
        item.onclick = () => selectSkill(sk.id);
        skillListEl.appendChild(item);
      }
    }

    function renderScenes() {
      sceneBarEl.innerHTML = "";
      for (const sk of state.skills) {
        const btn = document.createElement("button");
        btn.className = "scene-btn";
        btn.innerHTML = `<span class="icon">${sk.icon}</span><span>${esc(sk.name)}</span>`;
        btn.onclick = () => selectSkill(sk.id);
        sceneBarEl.appendChild(btn);
      }
    }

    function renderSessions() {
      sessionListEl.innerHTML = "";
      sessionCountEl.textContent = state.sessions.length;
      for (const sess of state.sessions) {
        const item = document.createElement("div");
        item.className = "session-item" + (sess.id === state.currentSessionId ? " active" : "");
        const timeStr = formatTime(sess.updated_at);
        item.innerHTML = `<span style="opacity:.5;font-size:11px;">💬</span><span class="title" title="${esc(sess.title)}">${esc(sess.title)}</span><span class="del" title="删除">✕</span>`;
        item.onclick = () => selectSession(sess.id);
        item.querySelector(".del").onclick = async (e) => {
          e.stopPropagation();
          await deleteSession(sess.id);
          state.sessions = state.sessions.filter(s => s.id !== sess.id);
          if (state.currentSessionId === sess.id) {
            state.currentSessionId = null;
            state.messages = {};
            showWelcome();
          }
          renderSessions();
        };
        sessionListEl.appendChild(item);
      }
    }

    function selectSkill(skillId) {
      if (state.currentSkill === skillId) {
        state.currentSkill = null;
      } else {
        state.currentSkill = skillId;
      }
      // Update skill list active state
      [...skillListEl.children].forEach((el, i) => {
        el.classList.toggle("active", state.skills[i].id === state.currentSkill);
      });
      // Update scene bar active state
      [...sceneBarEl.children].forEach((el, i) => {
        el.classList.toggle("active", state.skills[i].id === state.currentSkill);
      });
      inputEl.focus();
    }

    function selectSession(sessionId) {
      state.currentSessionId = sessionId;
      renderSessions();
      renderMessages();
      inputEl.focus();
    }

    function renderMessages() {
      const msgs = state.messages[state.currentSessionId] || [];
      if (msgs.length === 0) {
        showWelcome();
        return;
      }
      welcomeEl.style.display = "none";
      messagesEl.style.display = "flex";
      messagesEl.innerHTML = "";
      for (const msg of msgs) {
        appendMessageEl(msg.role, msg.content);
      }
      scrollToBottom();
    }

    function showWelcome() {
      welcomeEl.style.display = "block";
      messagesEl.style.display = "none";
    }

    function appendMessageEl(role, content) {
      const msg = document.createElement("div");
      msg.className = "msg " + role;

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = role === "user" ? "我" : "AI";

      const body = document.createElement("div");
      body.className = "body";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      if (role === "user") {
        bubble.textContent = content;
      } else {
        bubble.innerHTML = renderMarkdown(content);
      }

      body.appendChild(bubble);
      msg.appendChild(avatar);
      msg.appendChild(body);
      messagesEl.appendChild(msg);
      return bubble;
    }

    function addMessage(role, content) {
      if (!state.messages[state.currentSessionId]) {
        state.messages[state.currentSessionId] = [];
      }
      state.messages[state.currentSessionId].push({ role, content });
      if (welcomeEl.style.display !== "none") {
        welcomeEl.style.display = "none";
        messagesEl.style.display = "flex";
      }
      return appendMessageEl(role, content);
    }

    // ========== Chat ==========
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || state.busy) return;

      // Ensure we have a session
      if (!state.currentSessionId) {
        const sess = await createSession(text.slice(0, 30), state.currentModel);
        state.currentSessionId = sess.id;
        state.sessions.unshift(sess);
        state.messages[sess.id] = [];
        renderSessions();
      }

      state.busy = true;
      sendBtn.disabled = true;
      inputEl.value = "";
      autoResize();

      addMessage("user", text);
      const aiBubble = addMessage("ai", "");
      aiBubble.classList.add("typing");

      try {
        const resp = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message: text,
            session_id: state.currentSessionId,
            model: state.currentModel,
            skill_id: state.currentSkill,
          }),
        });

        if (!resp.ok || !resp.body) throw new Error("请求失败：HTTP " + resp.status);

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let answer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          let idx;
          while ((idx = buffer.indexOf("\n\n")) !== -1) {
            const chunk = buffer.slice(0, idx);
            buffer = buffer.slice(idx + 2);
            const result = handleEvent(chunk, aiBubble);
            if (result) answer += result;
          }
        }

        if (!answer.trim()) {
          aiBubble.textContent = "(无内容返回)";
        }

        // Save AI response
        state.messages[state.currentSessionId].push({ role: "ai", content: answer });

        // Update session title if it was the first message
        const sess = state.sessions.find(s => s.id === state.currentSessionId);
        if (sess && sess.title === "新对话") {
          sess.title = text.slice(0, 30) + (text.length > 30 ? "..." : "");
          renderSessions();
        }
      } catch (err) {
        aiBubble.classList.add("error");
        aiBubble.textContent = "出错了：" + err.message;
      } finally {
        aiBubble.classList.remove("typing");
        state.busy = false;
        sendBtn.disabled = false;
        inputEl.focus();
        scrollToBottom();
      }
    }

    function handleEvent(chunk, bubble) {
      let event = "message";
      let dataLines = [];
      for (const line of chunk.split("\n")) {
        if (line.startsWith("event:")) event = line.slice(6).trim();
        else if (line.startsWith("data:")) dataLines.push(line.slice(5).trim());
      }
      const dataRaw = dataLines.join("\n");
      let data = {};
      try { data = JSON.parse(dataRaw); } catch (_) {}

      if (event === "delta" && data.content) {
        bubble.classList.remove("typing");
        // Accumulate content, then re-render markdown
        const currentText = bubble.dataset.raw || "";
        const newText = currentText + data.content;
        bubble.dataset.raw = newText;
        bubble.innerHTML = renderMarkdown(newText);
        scrollToBottom();
        return data.content;
      } else if (event === "usage") {
        // 存储 token 用量，显示在消息下方
        const usageEl = document.createElement("div");
        usageEl.style.cssText = "font-size:11px;color:var(--text-faint);margin-top:6px;padding-top:6px;border-top:1px solid var(--border);display:flex;gap:12px;";
        usageEl.innerHTML = `<span>⬆️ 输入: <b style="color:var(--accent-2)">${data.prompt_tokens}</b></span><span>⬇️ 输出: <b style="color:var(--green)">${data.completion_tokens}</b></span><span>合计: <b style="color:var(--text)">${data.total_tokens}</b></span>`;
        bubble.appendChild(usageEl);
      } else if (event === "error") {
        bubble.classList.add("error");
        bubble.textContent = "出错了：" + (data.message || "未知错误");
      }
      return null;
    }

    // ========== Markdown ==========
    function renderMarkdown(text) {
      // Escape HTML first
      let html = esc(text);
      // Code blocks ```
      html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (m, lang, code) => {
        return `<pre><code>${code.trim()}</code></pre>`;
      });
      // Inline code
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Headers
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      // Bold
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // Links
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
      // Unordered lists
      html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
      // Paragraphs (split by double newline, skip blocks already wrapped)
      html = html.split(/\n\n+/).map(block => {
        if (block.startsWith('<') || block.trim() === '') return block;
        return `<p>${block.replace(/\n/g, '<br>')}</p>`;
      }).join('\n');
      return html;
    }

    function esc(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    // ========== Utils ==========
    function autoResize() {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + "px";
    }

    function scrollToBottom() {
      messagesWrap.scrollTop = messagesWrap.scrollHeight;
    }

    function formatTime(ts) {
      const d = new Date(ts * 1000);
      const now = new Date();
      const diff = (now - d) / 1000;
      if (diff < 60) return "刚刚";
      if (diff < 3600) return Math.floor(diff / 60) + "分钟前";
      if (diff < 86400) return Math.floor(diff / 3600) + "小时前";
      return `${d.getMonth() + 1}/${d.getDate()}`;
    }

    // ========== Event Handlers ==========
    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    inputEl.addEventListener("input", autoResize);

    $("newTaskBtn").addEventListener("click", async () => {
      state.currentSessionId = null;
      state.currentSkill = null;
      showWelcome();
      renderSessions();
      // Clear skill active state
      [...skillListEl.children].forEach(el => el.classList.remove("active"));
      [...sceneBarEl.children].forEach(el => el.classList.remove("active"));
      inputEl.focus();
    });

    $("clearBtn").addEventListener("click", () => {
      if (state.currentSessionId && state.messages[state.currentSessionId]) {
        state.messages[state.currentSessionId] = [];
        renderMessages();
      }
    });

    // Toggle sidebar
    $("toggleSidebar").addEventListener("click", () => {
      $("sidebar").classList.toggle("collapsed");
    });

    // Toggle skill section
    $("skillHeader").addEventListener("click", function() {
      this.classList.toggle("collapsed");
      skillListEl.classList.toggle("collapsed");
    });

    // Toggle session section
    $("sessionHeader").addEventListener("click", function() {
      this.classList.toggle("collapsed");
      sessionListEl.classList.toggle("collapsed");
    });

    // Model selector dropdown
    modelSelector.addEventListener("click", (e) => {
      e.stopPropagation();
      modelSelector.classList.toggle("open");
    });
    document.addEventListener("click", () => {
      modelSelector.classList.remove("open");
    });

    // ========== Token Stats Modal ==========
    const statsModalOverlay = $("statsModalOverlay");
    const statsModalBody = $("statsModalBody");

    async function fetchTokenStats() {
      try {
        const resp = await api("/api/token-stats");
        const data = await resp.json();
        renderTokenStats(data);
      } catch (err) {
        statsModalBody.innerHTML = `<div class="stats-empty">加载失败: ${esc(err.message)}</div>`;
      }
    }

    function renderTokenStats(data) {
      const s = data.summary || {};
      if (!s.total_requests || s.total_requests === 0) {
        statsModalBody.innerHTML = `<div class="stats-empty">暂无 Token 消耗记录<br><br>发送一条消息后刷新查看</div>`;
        return;
      }

      // 摘要卡片
      let html = `
        <div class="stats-summary">
          <div class="stats-card accent">
            <div class="label">请求次数</div>
            <div class="value">${s.total_requests}</div>
          </div>
          <div class="stats-card">
            <div class="label">输入 Tokens</div>
            <div class="value">${fmtNum(s.total_prompt)}</div>
            <div class="sub">⬆️ Prompt</div>
          </div>
          <div class="stats-card green">
            <div class="label">输出 Tokens</div>
            <div class="value">${fmtNum(s.total_completion)}</div>
            <div class="sub">⬇️ Completion</div>
          </div>
          <div class="stats-card orange">
            <div class="label">总 Tokens</div>
            <div class="value">${fmtNum(s.total_tokens)}</div>
            <div class="sub">合计</div>
          </div>
        </div>
      `;

      // 按模型统计 - 柱状图
      const byModel = data.by_model || [];
      if (byModel.length > 0) {
        const maxTokens = Math.max(...byModel.map(m => m.total_tokens), 1);
        html += `<div class="stats-section-title">按模型统计</div>`;
        html += `<div class="bar-chart">`;
        for (const m of byModel) {
          const promptPct = (m.prompt_tokens / maxTokens * 100).toFixed(1);
          const completionPct = (m.completion_tokens / maxTokens * 100).toFixed(1);
          const totalPct = (m.total_tokens / maxTokens * 100).toFixed(1);
          html += `
            <div class="bar-row">
              <div class="bar-label" title="${esc(m.display_name)}">${esc(m.display_name)}</div>
              <div class="bar-track">
                <div class="bar-fill prompt" style="width:${Math.max(promptPct,2)}%;position:absolute;left:0;">
                  <span class="bar-text" style="font-size:10px;">${m.prompt_tokens > maxTokens*0.15 ? m.prompt_tokens : ''}</span>
                </div>
                <div class="bar-fill completion" style="width:${Math.max(completionPct,2)}%;position:absolute;left:${promptPct}%;">
                  <span class="bar-text" style="font-size:10px;">${m.completion_tokens > maxTokens*0.15 ? m.completion_tokens : ''}</span>
                </div>
              </div>
              <div style="width:80px;text-align:right;font-size:12px;color:var(--text);font-weight:600;">${fmtNum(m.total_tokens)}</div>
            </div>
          `;
        }
        html += `</div>`;
      }

      // 按模型统计 - 表格
      if (byModel.length > 0) {
        html += `
          <div class="stats-section-title">模型明细</div>
          <table class="stats-table">
            <thead>
              <tr><th>模型</th><th class="num">请求数</th><th class="num">输入 Token</th><th class="num">输出 Token</th><th class="num">总计</th></tr>
            </thead>
            <tbody>
        `;
        for (const m of byModel) {
          html += `<tr>
            <td><span class="model-tag">${esc(m.display_name)}</span></td>
            <td class="num">${m.request_count}</td>
            <td class="num" style="color:var(--accent-2)">${fmtNum(m.prompt_tokens)}</td>
            <td class="num" style="color:var(--green)">${fmtNum(m.completion_tokens)}</td>
            <td class="num" style="font-weight:600">${fmtNum(m.total_tokens)}</td>
          </tr>`;
        }
        html += `</tbody></table>`;
      }

      // 最近记录
      const recent = data.recent || [];
      if (recent.length > 0) {
        html += `
          <div class="stats-section-title">最近记录</div>
          <table class="stats-table">
            <thead>
              <tr><th>时间</th><th>模型</th><th class="num">输入</th><th class="num">输出</th><th class="num">总计</th></tr>
            </thead>
            <tbody>
        `;
        for (const r of recent) {
          html += `<tr>
            <td style="white-space:nowrap">${formatTime(r.timestamp)}</td>
            <td><span class="model-tag">${esc(shortModelName(r.model))}</span></td>
            <td class="num">${r.prompt_tokens}</td>
            <td class="num">${r.completion_tokens}</td>
            <td class="num" style="font-weight:600">${r.total_tokens}</td>
          </tr>`;
        }
        html += `</tbody></table>`;
      }

      statsModalBody.innerHTML = html;
    }

    function fmtNum(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
      if (n >= 1000) return (n / 1000).toFixed(1) + "K";
      return String(n);
    }

    function shortModelName(name) {
      const parts = name.split("/");
      return parts[parts.length - 1];
    }

    var tokenStatsBtn = $("tokenStatsBtn");
    if (tokenStatsBtn) tokenStatsBtn.addEventListener("click", () => {
      statsModalOverlay.classList.add("open");
      fetchTokenStats();
    });
    $("statsCloseBtn").addEventListener("click", () => {
      statsModalOverlay.classList.remove("open");
    });
    $("statsRefreshBtn").addEventListener("click", fetchTokenStats);
    statsModalOverlay.addEventListener("click", (e) => {
      if (e.target === statsModalOverlay) statsModalOverlay.classList.remove("open");
    });

    // ========== Init ==========
    async function init() {
      try {
        await Promise.all([fetchModels(), fetchSkills()]);
        await fetchSessions();
        inputEl.focus();
      } catch (err) {
        console.error("初始化失败:", err);
      }
    }

    init();
  </script>
</body>
</html>
