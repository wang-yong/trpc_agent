# =========================================================================
# 🛡️ trpc_agent 智能体安全防护审批配置文件 (Human-in-the-Loop)
# =========================================================================

# 1. 是否全局启用人机安全审批
#    - true:  启用阻断弹窗并挂起审批，物理级守护本地电脑绝对安全
#    - false: 禁用审批，自动 100% 允许并放行所有高危特权行为
enabled: true

# 2. 细粒度控制：配置哪些具体高危动作在执行前需要阻断并弹窗审批。
#    如果某项动作在此列表里被注释或删除，则该动作将不会触发安全审批，自动批准放行。
actions:
  - write_file    # 物理新建/写入文件行为
  - edit_file     # 精细手术刀局部代码修改行为
  - run_command   # 本地 CMD 控制台命令行执行行为

# =========================================================================
# 🎨 前端流体打字机流式输出速度配置 (免重启热加载生效)
# =========================================================================
# 1. 规定前端每一个字符溢出流淌的时间间隔（单位：毫秒/字）
#    - 0:  不限流，收到后端数据立刻暴风式刷出（最快但突兀，流水效果不明显）
#    - 15: 推荐的最爽丝滑流速（每 15 毫秒流出一个字，极其均匀好看）
#    - 30: 偏慢、极富液体墨水缓动流淌感的高阶极客流速（每 30 毫秒流出一个字）
#    老公可以根据自己的视觉偏好，在这里随意改动数值并保存，网页下一秒就会热加载生效哦！
typing_speed: 20
